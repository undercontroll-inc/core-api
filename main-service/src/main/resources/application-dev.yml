spring:
  config:
    activate:
      on-profile: dev

  # H2 Database
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  h2:
    console:
      enabled: true

logging:
  level:
    root: DEBUG
    com.undercontroll: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
