name: CD - Main Branch

on:
  push:
  workflow_run:
    workflows: ["CI/CD - Main Branch"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/undercontroll-inc/core-api:latest
            ghcr.io/undercontroll-inc/core-api:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy via SSM
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ secrets.BACKEND_INSTANCE_ID }}"
          REGION="us-east-1"

          # envia o comando e captura o CommandId
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy core-api ${{ github.sha }}" \
            --timeout-seconds 300 \
            --parameters 'commands=[
              "set -e",
              "echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "mkdir -p /opt/app",
              "cat > /opt/app/.env << '\''EOF'\''",
              "DB_HOST=${{ secrets.DB_HOST }}",
              "DB_USERNAME=${{ secrets.DB_USERNAME }}",
              "DB_PASSWORD=${{ secrets.DB_PASSWORD }}",
              "RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}",
              "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}",
              "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}",
              "JWT_SECRET=${{ secrets.JWT_SECRET }}",
              "MAIL_HOST=${{ secrets.MAIL_HOST }}",
              "MAIL_PORT=${{ secrets.MAIL_PORT }}",
              "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}",
              "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}",
              "EOF",
              "chmod 600 /opt/app/.env",
              "curl -fsSL -H '\''Authorization: token ${{ secrets.GH_PAT }}'\'' -H '\''Accept: application/vnd.github.v3.raw'\'' https://api.github.com/repos/undercontroll-inc/infra/contents/docker-compose.prod.yml -o /opt/app/docker-compose.yml",
              "docker compose -f /opt/app/docker-compose.yml pull main-service",
              "docker compose -f /opt/app/docker-compose.yml up -d main-service",
              "docker image prune -f"
            ]' \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "Sent SSM command: $COMMAND_ID"

          # aguarda execução completa do comando na instância
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION"

          echo "Command executed — fetching invocation result..."

          # pega o output (stdout e status)
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "Status" --output text)

          STDOUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" --output text)

          STDERR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardErrorContent" --output text)

          echo "SSM invocation status: $STATUS"
          echo "----- STDOUT -----"
          echo "$STDOUT"
          echo "----- STDERR -----"
          echo "$STDERR"

          # opcional: falhar a job se o comando não terminou com sucesso
          if [ "$STATUS" != "Success" ]; then
            echo "SSM command did not succeed (status: $STATUS)" >&2
            exit 1
          fi
